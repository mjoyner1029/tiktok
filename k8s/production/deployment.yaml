apiVersion: v1
kind: Namespace
metadata:
  name: tiktok-engine
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tiktok-config
  namespace: tiktok-engine
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  JSON_LOGS: "true"
  DATABASE_URL: "postgresql+asyncpg://postgres:password@postgres:5432/tiktok_engine"
  REDIS_URL: "redis://redis:6379/0"
  STORAGE_BACKEND: "s3"
  S3_BUCKET: "tiktok-engine-prod"
  S3_REGION: "us-east-1"
  EXPORT_WIDTH: "1080"
  EXPORT_HEIGHT: "1920"
  EXPORT_FPS: "30"
---
apiVersion: v1
kind: Secret
metadata:
  name: tiktok-secrets
  namespace: tiktok-engine
type: Opaque
stringData:
  SECRET_KEY: "MUST_BE_SET_VIA_SEALED_SECRETS"
  ANTHROPIC_API_KEY: "MUST_BE_SET"
  STRIPE_SECRET_KEY: "MUST_BE_SET"
  STRIPE_WEBHOOK_SECRET: "MUST_BE_SET"
  SENTRY_DSN: "MUST_BE_SET"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-api
  namespace: tiktok-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tiktok-api
  template:
    metadata:
      labels:
        app: tiktok-api
    spec:
      containers:
        - name: api
          image: ghcr.io/yourorg/tiktok-engine:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tiktok-config
            - secretRef:
                name: tiktok-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tiktok-api
  namespace: tiktok-engine
spec:
  selector:
    app: tiktok-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-worker-media
  namespace: tiktok-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tiktok-worker
      queue: media
  template:
    metadata:
      labels:
        app: tiktok-worker
        queue: media
    spec:
      containers:
        - name: worker
          image: ghcr.io/yourorg/tiktok-engine:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "media", "-c", "2", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: tiktok-config
            - secretRef:
                name: tiktok-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-worker-render
  namespace: tiktok-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tiktok-worker
      queue: render
  template:
    metadata:
      labels:
        app: tiktok-worker
        queue: render
    spec:
      containers:
        - name: worker
          image: ghcr.io/yourorg/tiktok-engine:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "render", "-c", "1", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: tiktok-config
            - secretRef:
                name: tiktok-secrets
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "8000m"
              memory: "16Gi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiktok-ingress
  namespace: tiktok-engine
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.tiktokengine.com
      secretName: tiktok-tls
  rules:
    - host: api.tiktokengine.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tiktok-api
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tiktok-api-hpa
  namespace: tiktok-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tiktok-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
